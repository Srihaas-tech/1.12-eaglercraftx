<!-- index.html -->
<!DOCTYPE html>
<html style="width:100%;height:100%;background-color:black;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0" />
    <meta id="meta-description" name="description" content="" />
    <meta id="meta-keywords" name="keywords" content="" />
    <title id="page-title"></title>
    <meta property="og:locale" content="en-US" />
    <meta property="og:type" content="website" />
    <meta id="og-title" property="og:title" content="" />
    <meta id="og-description" property="og:description" content="" />
    <meta property="og:image" content="favicon.png" />
    <link type="image/png" rel="shortcut icon" href="favicon.png" />
    <script type="text/javascript" src="bootstrap.js"></script>
    <script type="text/javascript" src="version-config.js"></script>
    <script type="text/javascript">
      "use strict";
      window.addEventListener("load", function () {
        if (window.location.href.indexOf("file:") === 0) {
          alert("HTTP please, do not open this file locally, run a local HTTP server and load it via HTTP");
          return;
        }

        const cfg = window.EAGLERCRAFT_VERSION_CONFIG || {};
        document.getElementById("page-title").textContent = cfg.title || "Eaglercraft";
        document.getElementById("meta-description").setAttribute("content", cfg.description || "");
        document.getElementById("meta-keywords").setAttribute("content", cfg.keywords || "");
        document.getElementById("og-title").setAttribute("content", cfg.ogTitle || cfg.title || "");
        document.getElementById("og-description").setAttribute("content", cfg.description || "");

        const relayId = Math.floor(Math.random() * 3);
        window.eaglercraftXOpts = {
          demoMode: false,
          container: "game_frame",
          assetsURI: cfg.assetsURI || "assets.epw",
          worldsDB: cfg.worldsDB || "worlds",
          versionId: cfg.versionId || "1.12.2",
          servers: cfg.servers || [],
          relays: cfg.relays || [
            { addr: "wss://relay.deev.is/", comment: "relay #1", primary: relayId == 0 },
            { addr: "wss://relay.lax1dude.net/", comment: "relay #2", primary: relayId == 1 },
            { addr: "wss://relay.shhnowisnottheti.me/", comment: "relay #3", primary: relayId == 2 }
          ]
        };

        const q = window.location.search;
        if (typeof q === "string" && q[0] === "?" && typeof window.URLSearchParams !== "undefined") {
          const s = new window.URLSearchParams(q).get("server");
          if (s) window.eaglercraftXOpts.joinServer = s;
        }

        main();
      });
    </script>
  </head>
  <body style="margin:0px;width:100%;height:100%;overflow:hidden;background-color:black;" id="game_frame"></body>
</html>
